<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games Snake — All Hands Julio</title>
<style>
  :root{
    --lcd:#aeba6a;        /* fondo pantalla LCD */
    --lcd-light:#c3cd84;  /* brillo LCD */
    --ink:#2b3018;        /* pixeles oscuros */
    --ink-soft:#3d4322;
    --body:#12233f;       /* plástico NOKIA */
    --body-dark:#0c1830;
    --body-hi:#24406b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(circle at 50% 30%, #1b2f52 0%, #0a1224 70%, #05080f 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Courier New',ui-monospace,monospace;
    color:var(--ink);overflow:hidden;
    -webkit-font-smoothing:none;
  }

  /* ===== Cuerpo del teléfono NOKIA ===== */
  .phone{
    background:linear-gradient(160deg,var(--body-hi),var(--body) 40%,var(--body-dark));
    border-radius:46px 46px 60px 60px;
    padding:34px 30px 46px;
    box-shadow:0 26px 60px rgba(0,0,0,.6), inset 0 2px 3px rgba(255,255,255,.15), inset 0 -6px 14px rgba(0,0,0,.5);
    width:min(92vw, 560px);
    position:relative;z-index:2;
  }
  .brand{
    text-align:center;color:#dfe7f5;letter-spacing:6px;font-weight:bold;
    font-size:20px;margin-bottom:6px;text-shadow:0 1px 1px rgba(0,0,0,.6);
    opacity:.92;
  }
  .speaker{
    width:54px;height:7px;border-radius:5px;background:var(--body-dark);
    margin:0 auto 12px;box-shadow:inset 0 1px 2px rgba(0,0,0,.7);
  }

  /* ===== Marco de la pantalla ===== */
  .bezel{
    background:linear-gradient(160deg,#243b1f,#152413);
    border-radius:14px;padding:14px;
    box-shadow:inset 0 3px 10px rgba(0,0,0,.7), 0 1px 1px rgba(255,255,255,.08);
  }
  .screen{
    position:relative;background:var(--lcd);border-radius:5px;overflow:hidden;
    box-shadow:inset 0 0 0 2px #7f8a4d, inset 0 0 26px rgba(0,0,0,.28);
    aspect-ratio:24/17;
  }
  canvas{
    display:block;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }
  .scanlines{
    position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 2px, transparent 2px 4px);
    mix-blend-mode:multiply;
  }

  /* ===== Overlays (title / card / victory) ===== */
  .overlay{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:6% 8%;background:var(--lcd);color:var(--ink);
    animation:pop .18s ease-out;
  }
  .overlay.show{display:flex}
  @keyframes pop{from{transform:scale(.96);opacity:.4}to{transform:scale(1);opacity:1}}
  .overlay .kicker{font-size:clamp(9px,2.4vw,13px);letter-spacing:3px;text-transform:uppercase;opacity:.7}
  .overlay .emoji{font-size:clamp(34px,10vw,60px);line-height:1;margin:6px 0 4px;filter:grayscale(.15)}
  .overlay .title{font-size:clamp(15px,4.4vw,26px);font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;line-height:1.15}
  .overlay .desc{font-size:clamp(10px,3vw,15px);line-height:1.55;max-width:44ch;font-weight:bold}
  .overlay .hint{margin-top:18px;font-size:clamp(9px,2.4vw,12px);letter-spacing:2px;text-transform:uppercase;opacity:.6;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .overlay h1.big{font-size:clamp(20px,6vw,40px);text-transform:uppercase;letter-spacing:2px;line-height:1}
  .dots{display:flex;gap:6px;margin-top:14px}
  .dots i{width:9px;height:9px;border:2px solid var(--ink);display:block}
  .dots i.on{background:var(--ink)}
  .creds{font-size:clamp(9px,2.6vw,14px);line-height:1.7;max-width:40ch;font-weight:bold}
  .creds b{letter-spacing:1px}
  .section-title{font-size:clamp(10px,2.8vw,14px);letter-spacing:3px;text-transform:uppercase;margin:14px 0 6px;border-bottom:2px solid var(--ink);padding-bottom:3px}
  #ovWin .arcade-title{width:clamp(190px,54vw,320px);margin:0 0 4px}
  .leaderboard{width:100%;max-width:30ch;margin:2px auto 0;display:flex;flex-direction:column;gap:7px}
  .lb-row{display:flex;align-items:baseline;font-weight:bold;text-transform:uppercase;
    letter-spacing:1px;font-size:clamp(11px,3.2vw,17px);color:var(--ink)}
  .lb-row .lead{flex:1;border-bottom:2px dotted var(--ink);margin:0 6px;transform:translateY(-4px)}
  .lb-row .lb-name,.lb-row .lb-pts{white-space:nowrap}
  .lb-row .lb-icon{width:16px;height:16px;margin-right:5px;align-self:center;image-rendering:pixelated;image-rendering:crisp-edges}
  .scroll{max-height:78%;overflow:auto;width:100%}
  .scroll::-webkit-scrollbar{width:6px}
  .scroll::-webkit-scrollbar-thumb{background:var(--ink-soft)}

  /* ===== Pantalla de inicio arcade "START" ===== */
  #ovTitle{justify-content:center;padding:8% 7% 6%;background:transparent}
  .t-bar{
    position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:6px 12px;font-size:clamp(9px,2.6vw,13px);font-weight:bold;
    letter-spacing:2px;text-transform:uppercase;
    background:var(--ink);color:var(--lcd);border-bottom:2px solid var(--lcd-light);
  }
  .hearts-cv{display:block;height:clamp(12px,3vw,15px);width:auto;image-rendering:pixelated;image-rendering:crisp-edges}
  .arcade-title{
    display:block;width:clamp(230px,66vw,440px);height:auto;margin:3% 0 6%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }
  .t-choice{
    display:flex;gap:44px;font-weight:bold;letter-spacing:3px;
    font-size:clamp(17px,4.6vw,28px);text-transform:uppercase;color:var(--ink);
  }
  .t-choice .opt{opacity:.4}
  .t-choice .opt.sel{opacity:1;animation:blink 1s steps(1) infinite}
  .t-choice .opt.sel::after{content:" ◄"}

  /* ===== Pantalla de Chocaste (mismo estilo que Start) ===== */
  #ovOver{justify-content:center;padding:8% 7% 6%;background:transparent}
  #ovOver .arcade-title{width:clamp(150px,40vw,225px);margin:2% 0 4%}
  #ovOver .over-q{
    font-size:clamp(11px,3vw,17px);font-weight:bold;letter-spacing:1px;
    text-transform:uppercase;color:var(--ink);margin-bottom:12px;
  }

  /* ===== Tarjeta arcade "nivel completado" ===== */
  #ovCard{padding:3% 4%;justify-content:center}
  .arcade-frame{
    width:100%;background:var(--lcd);
    border:3px solid var(--ink);
    box-shadow:0 0 0 3px var(--lcd), 0 0 0 6px var(--ink);
    padding:0 0 12px;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    animation:frameIn .28s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes frameIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .banner{
    width:100%;background:var(--ink);color:var(--lcd);
    font-weight:bold;text-transform:uppercase;letter-spacing:2px;
    font-size:clamp(11px,3vw,16px);padding:6px 4px;text-align:center;
  }
  .banner .flash{animation:blink 1s steps(1) infinite}
  .reward{
    margin:6px 6% 10px;padding:4px 14px;
    display:flex;flex-direction:column;align-items:center;
    animation:rewardIn .4s ease-out .12s both;
  }
  @keyframes rewardIn{from{opacity:0;transform:translateY(9px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .reward .r-emoji{width:clamp(34px,9vw,50px);height:auto;margin-bottom:4px;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
  .reward .r-title{font-size:clamp(13px,3.8vw,21px);font-weight:bold;text-transform:uppercase;letter-spacing:1px;text-align:center;line-height:1.15;margin-bottom:4px}
  .reward .r-desc{font-size:clamp(9px,2.6vw,12px);font-weight:bold;line-height:1.42;text-align:center;max-width:38ch}
  .card-stats{width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:7px 14px 0;color:var(--ink);font-weight:bold;font-size:clamp(11px,3vw,15px);letter-spacing:1px}
  #ovCard .hint, #ovWin .hint{margin-top:10px;font-size:clamp(14px,4vw,22px);opacity:.9;animation:none}
  #ovCard .hint .ba, #ovWin .hint .ba{animation:blink 1s steps(1) infinite}

  /* HUD */
  .hud{
    position:absolute;top:0;left:0;right:0;height:calc(100% / 17);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 10px;font-size:clamp(8px,2.4vw,12px);letter-spacing:1px;
    text-transform:uppercase;color:var(--lcd);pointer-events:none;font-weight:bold;
  }
  .hud-left{display:flex;align-items:center;gap:8px}

  /* Botones físicos decorativos */
  .keys{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:20px}
  .dpad{width:96px;height:96px;position:relative}
  .dpad div{position:absolute;background:linear-gradient(#33507f,#1a2c4d);border-radius:8px;box-shadow:inset 0 1px 2px rgba(255,255,255,.2),0 2px 3px rgba(0,0,0,.5)}
  .dpad .up{top:0;left:33px;width:30px;height:34px}
  .dpad .down{bottom:0;left:33px;width:30px;height:34px}
  .dpad .left{left:0;top:33px;width:34px;height:30px}
  .dpad .right{right:0;top:33px;width:34px;height:30px}
  .dpad .mid{top:33px;left:33px;width:30px;height:30px;background:#22375c}
  .navrow{display:flex;flex-direction:column;gap:10px}
  .navrow b{background:linear-gradient(#33507f,#1a2c4d);color:#cfe;border-radius:20px;padding:8px 16px;font-size:11px;letter-spacing:1px;box-shadow:inset 0 1px 2px rgba(255,255,255,.2),0 2px 3px rgba(0,0,0,.5)}

  .foot{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#93a6c9;font-size:10px;letter-spacing:2px;opacity:.5}

  /* ===== Polaroids detrás del teléfono ===== */
  .polaroids{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
  .polaroid{
    position:absolute;top:50%;left:50%;width:270px;
    background:#f6f4ec;padding:14px 14px 44px;border-radius:3px;
    box-shadow:0 20px 44px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.4);
    --x:0px;--y:0px;--r:0deg;--xo:0px;--yo:0px;
    transform:translate(-50%,-50%) scale(.45);opacity:0;
    transition:transform .6s cubic-bezier(.2,.85,.25,1), opacity .5s ease;
  }
  .polaroid.in{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) rotate(var(--r)) scale(1);opacity:1}
  .polaroid.out{transform:translate(calc(-50% + var(--xo)),calc(-50% + var(--yo))) rotate(var(--r)) scale(.7);opacity:0;
    transition:transform .5s cubic-bezier(.6,0,.8,.3), opacity .45s ease-in}
  .polaroid img.pic{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#111;border-radius:1px}
  .polaroid .ph{width:100%;aspect-ratio:4/3;display:flex;flex-direction:column;gap:4px;
    align-items:center;justify-content:center;border-radius:1px;
    background:linear-gradient(135deg,#2c3a5e,#141d31);color:#9fb4d8;
    font-size:12px;letter-spacing:1px;text-align:center}
  .polaroid .ph span{font-size:26px}
  .polaroid .cap{position:absolute;left:0;right:0;bottom:12px;text-align:center;
    font-family:'Courier New',monospace;font-weight:bold;font-size:20px;
    letter-spacing:2px;text-transform:uppercase;color:#2b2b2b}
</style>
</head>
<body>
  <div class="polaroids" id="polaroids"></div>
  <div class="phone">
    <div class="speaker"></div>
    <div class="bezel">
      <div class="screen">
        <canvas id="game" width="480" height="340"></canvas>
        <div class="scanlines"></div>
        <div class="hud" id="hud" style="display:none">
          <canvas class="hearts-cv" id="hudHearts"></canvas>
          <span id="hudLevel">NIVEL 1/3</span>
          <span id="hudScore">PTS 0</span>
        </div>

        <!-- Título (estilo arcade "START") -->
        <div class="overlay show" id="ovTitle">
          <div class="t-bar"><canvas class="hearts-cv" id="startHearts"></canvas><span>MONOKU GAMES</span></div>
          <canvas class="arcade-title" id="startArt" width="160" height="40"></canvas>
          <div class="t-choice">
            <span class="opt" id="optSi">SÍ</span>
            <span class="opt" id="optNo">NO</span>
          </div>
        </div>

        <!-- Tarjeta de logro (arcade "nivel completado") -->
        <div class="overlay" id="ovCard">
          <div class="arcade-frame">
            <div class="banner">★ NIVEL <span id="cardNum">1</span> <span class="flash">COMPLETADO</span> ★</div>
            <div class="card-stats">
              <canvas class="hearts-cv" id="cardHearts"></canvas>
              <span id="cardScore">PTS 0</span>
            </div>
            <div class="reward">
              <canvas class="r-emoji" id="cardEmoji" width="18" height="18"></canvas>
              <div class="r-title" id="cardTitle"></div>
              <div class="r-desc" id="cardDesc"></div>
            </div>
            <div class="hint"><span class="ba">▶</span> Continuar</div>
          </div>
        </div>

        <!-- Game over (mismo estilo que Start) -->
        <div class="overlay" id="ovOver">
          <div class="t-bar"><canvas class="hearts-cv" id="overHearts"></canvas><span>MONOKU GAMES</span></div>
          <canvas class="arcade-title" id="overArt" width="120" height="72"></canvas>
          <div class="over-q">¿Reintentar?</div>
          <div class="t-choice">
            <span class="opt" id="optSiOver">SÍ</span>
            <span class="opt" id="optNoOver">NO</span>
          </div>
        </div>

        <!-- Victoria -->
        <div class="overlay" id="ovWin">
          <div class="t-bar">
            <canvas class="hearts-cv" id="winHearts"></canvas>
            <span id="winLevels">3/3</span>
            <span id="winScore">PTS 0</span>
          </div>
          <canvas class="arcade-title" id="winArt" width="170" height="44"></canvas>
          <div class="leaderboard">
            <div class="lb-row"><canvas class="lb-icon" id="lbIcon" width="16" height="16"></canvas><span class="lb-name">Yeison</span><span class="lead"></span><span class="lb-pts">9800</span></div>
            <div class="lb-row"><span class="lb-name">Lina</span><span class="lead"></span><span class="lb-pts">9400</span></div>
            <div class="lb-row"><span class="lb-name">Ale</span><span class="lead"></span><span class="lb-pts">9000</span></div>
            <div class="lb-row"><span class="lb-name">Tú</span><span class="lead"></span><span class="lb-pts" id="lbYou">0</span></div>
          </div>
          <div class="hint"><span class="ba">▶</span> Restart</div>
        </div>
      </div>
    </div>

    <div class="keys">
      <div class="dpad" title="Flechas / WASD">
        <div class="up"></div><div class="left"></div><div class="mid"></div><div class="right"></div><div class="down"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  // ---------- Datos de niveles (logros del equipo) ----------
  const LEVELS = [
    { emoji:"🚀", title:"El juego dio un salto",
      desc:"Rumbo, narrativa, misiones con arte, IA, cartas y +178 FPS" },
    { emoji:"🧪", title:"Nuevas formas de trabajar",
      desc:"Claude Design, horneado de FX, memoria de diseño y precarga" },
    { emoji:"🎯", title:"Lo que viene",
      desc:"Marketing de Kismet, QA para lanzar, 3 misiones nuevas y el video de la plaga" },
  ];

  // ---------- Setup grid ----------
  const COLS = 24, ROWS = 17, CELL = 20;
  const PLAY_TOP = 1;   // fila reservada arriba para el HUD (nivel / 📼 / puntos)
  const canvas = document.getElementById("game");
  canvas.width = COLS * CELL;   // 480
  canvas.height = ROWS * CELL;  // 340
  const ctx = canvas.getContext("2d");

  const INK = "#2b3018", INK_SOFT = "#4a5228", LCD = "#aeba6a", LCD_LIGHT = "#c3cd84";

  // ---------- Estado ----------
  const STATE = { TITLE:0, PLAY:1, CARD:2, OVER:3, WIN:4, PAUSE:5, DYING:6 };
  let dyingVisible = true;   // parpadeo de la culebra al perder una vida
  let state = STATE.TITLE;
  let level = 0;
  let score = 0;
  let snake, dir, nextDir, food, item, tickMs, timer, blink = 0;
  let obstacles = [], foodEaten = 0, foodNeeded = 0;
  let titleBricks = [];   // cúmulos decorativos de la pantalla de Start
  const MAX_LIVES = 3;
  let lives = MAX_LIVES, overMode = "retry";   // vidas y tipo de pantalla al chocar

  const el = id => document.getElementById(id);
  const overlays = { title:el("ovTitle"), card:el("ovCard"), over:el("ovOver"), win:el("ovWin") };
  const polaroidBox = el("polaroids");
  const hud = el("hud");

  function showOverlay(name){
    Object.values(overlays).forEach(o => o.classList.remove("show"));
    if (name) overlays[name].classList.add("show");
    hud.style.display = (name === null) ? "flex" : "none";
  }

  function eq(a,b){ return a.x===b.x && a.y===b.y; }
  function onSnake(p){ return snake.some(s => eq(s,p)); }
  function onObstacle(p){ return obstacles.some(o => eq(o,p)); }
  function randCell(){ return { x: (Math.random()*COLS)|0, y: PLAY_TOP + (Math.random()*(ROWS-PLAY_TOP))|0 }; }
  function freeCell(){ let p; do { p = randCell(); } while (onSnake(p) || onObstacle(p) || (item&&eq(p,item)) || (food&&eq(p,food))); return p; }

  // ---------- Ciclo de vida ----------
  function startGame(){ hidePolaroids(); level = 0; score = 0; lives = MAX_LIVES; updateLivesUI(); startLevel(); }

  function startLevel(){
    const cx = (COLS/2)|0, cy = (ROWS/2)|0;
    snake = [ {x:cx-1,y:cy}, {x:cx-2,y:cy}, {x:cx-3,y:cy} ];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    placeObstacles(cy);                 // rocas a esquivar (más entre más alto el nivel)
    foodEaten = 0;
    foodNeeded = 3 + level;             // burbujas a comer antes de que salga el 📼
    item = null;                        // el casete aparece luego
    food = freeCell();
    tickMs = 175 - level * 13;          // cada nivel más rápido
    state = STATE.PLAY;
    showOverlay(null);
    updateHud();
    loop(true);
  }

  // Al perder una vida (con vidas restantes): la culebra parpadea en el lugar y reaparece sola.
  function startDying(){
    state = STATE.DYING;
    dyingVisible = true;
    let flashes = 0;
    const t = setInterval(() => {
      dyingVisible = !dyingVisible;
      draw();
      if (++flashes >= 7){ clearInterval(t); dyingVisible = true; retryLevel(); }
    }, 120);
  }

  // Reintento tras choque: NO pierde el avance (burbujas, casete, rocas, puntaje);
  // solo reaparece la serpiente en el centro.
  function retryLevel(){
    const cx = (COLS/2)|0, cy = (ROWS/2)|0;
    snake = [ {x:cx-1,y:cy}, {x:cx-2,y:cy}, {x:cx-3,y:cy} ];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    if (item && (onSnake(item) || onObstacle(item))) item = freeCell();  // reubica si quedó bajo la serpiente
    food = freeCell();
    state = STATE.PLAY;
    showOverlay(null);
    updateHud();
    loop(true);
  }

  // Cada obstáculo es un CÚMULO de cuadros (bloque más grande), no una sola celda.
  const OBSTACLE_SHAPES = [
    [[0,0],[1,0]],                 // dominó horizontal
    [[0,0],[0,1]],                 // dominó vertical
    [[0,0],[1,0],[0,1]],           // L de 3
    [[0,0],[1,0],[1,1]],           // L de 3 (otra)
    [[0,0],[1,0],[0,1],[1,1]],     // cuadrado 2x2
    [[0,0],[1,0],[2,0]],           // línea de 3 horizontal
    [[0,0],[0,1],[0,2]],           // línea de 3 vertical
  ];

  // Genera 'count' cúmulos (lista plana de celdas) evitando lo que diga forbidden()
  function buildClusters(count, forbidden){
    const out = [];
    const has = c => out.some(o => o.x===c.x && o.y===c.y);
    let guard = 0, placed = 0;
    while (placed < count && guard++ < 800){
      const shape = OBSTACLE_SHAPES[(Math.random()*OBSTACLE_SHAPES.length)|0];
      const ax = (Math.random()*COLS)|0;
      const ay = PLAY_TOP + ((Math.random()*(ROWS-PLAY_TOP))|0);
      const cells = shape.map(([dx,dy]) => ({ x:ax+dx, y:ay+dy }));
      let ok = true;
      for (const c of cells){
        if (c.x<0 || c.x>=COLS || c.y<PLAY_TOP || c.y>=ROWS){ ok=false; break; }
        if (has(c) || forbidden(c)){ ok=false; break; }
      }
      if (!ok) continue;
      for (const c of cells) out.push(c);
      placed++;
    }
    return out;
  }

  // Coloca cúmulos de obstáculos evitando la fila y el camino inicial de la serpiente
  function placeObstacles(startRow){
    const cxMid = (COLS/2)|0;
    obstacles = buildClusters(2 + Math.floor(level/2), c =>
      onSnake(c) || c.y===startRow ||
      (Math.abs(c.x-cxMid)<2 && Math.abs(c.y-startRow)<2)   // aire cerca del inicio
    );
  }

  function updateHud(){
    el("hudLevel").textContent = "NIVEL " + (level+1) + "/" + LEVELS.length;
    el("hudScore").textContent = "PTS " + score;
  }

  function loop(reset){
    clearInterval(timer);
    if (reset) draw();
    timer = setInterval(step, tickMs);
  }

  function step(){
    if (state !== STATE.PLAY) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // choque con pared, consigo mismo o una roca -> game over (reintenta nivel)
    if (head.x<0 || head.y<PLAY_TOP || head.x>=COLS || head.y>=ROWS || onSnake(head) || onObstacle(head)){
      clearInterval(timer);
      lives = Math.max(0, lives - 1);              // consume una vida
      updateLivesUI();
      if (lives > 0){ startDying(); return; }      // quedan vidas: parpadea en el lugar y reaparece rápido
      overMode = "gameover";                       // última vida: pantalla GAME OVER
      renderOverArt("GAME OVER");
      state = STATE.OVER; setOverSel("si"); draw(); showOverlay("over"); return;
    }

    snake.unshift(head);

    if (item !== null && eq(head, item)){   // ¡logro del nivel!
      score += 100;
      state = STATE.CARD; clearInterval(timer);
      showCard(); draw(); return;
    }
    if (eq(head, food)){                     // burbuja normal: crece y suma para el casete
      score += 10; foodEaten++;
      if (item === null && foodEaten >= foodNeeded) item = freeCell();   // ¡aparece el 📼!
      food = freeCell(); updateHud();
    } else {
      snake.pop();
    }
    draw();
  }

  function showCard(){
    const L = LEVELS[level];
    el("cardNum").textContent = (level+1);
    renderIconCanvas(el("cardEmoji"), L.emoji);
    renderHearts(el("cardHearts"), lives, true);   // corazones oscuros sobre la placa clara
    el("cardScore").textContent = "PTS " + score;
    el("cardTitle").textContent = L.title;
    el("cardDesc").textContent = L.desc;
    updateHud();
    buildPolaroids(levelPolaroids(level));
    showOverlay("card");
    requestAnimationFrame(() => requestAnimationFrame(showPolaroids));
  }

  // ---------- Polaroids (fotos detrás del teléfono) ----------
  // Posiciones (abanico) alrededor del teléfono. x/y = destino visible,
  // xo/yo = a dónde se van al salir del encuadro.
  // Pool amplio de posiciones alrededor del teléfono; cada nivel toma un trío distinto.
  const SLOTS = [
    { x:-400, y:-165, r:-9 },   // 0 arriba izq
    { x: 410, y:-140, r: 8 },   // 1 arriba der
    { x:-420, y: 170, r: 7 },   // 2 abajo izq
    { x: 425, y: 155, r:-7 },   // 3 abajo der
    { x:-445, y:  10, r: 5 },   // 4 medio izq
    { x: 435, y:  15, r:-6 },   // 5 medio der
    { x:-370, y:-235, r:12 },   // 6 muy arriba izq
    { x: 390, y: 250, r:-11 },  // 7 muy abajo der
  ];
  const PER_LEVEL = 3;   // 2–3 fotos por nivel

  // Trío de fotos + posiciones para cada nivel (toma un tramo distinto del pool).
  function levelPolaroids(lvl){
    const start = (lvl * 3) % SLOTS.length;
    return "abc".split("").map((s, i) => ({
      src: "images/" + (lvl+1) + "/" + (lvl+1) + "-" + s + ".png",
      slot: SLOTS[(start + i) % SLOTS.length],
    }));
  }

  // Fotos del equipo para la pantalla de victoria (con nombre en la franja).
  const WIN_SLOTS = [
    { x:-420, y:-45, r:-7 },   // izquierda
    { x: 425, y:-60, r: 7 },   // derecha
    { x:  12, y: 255, r:-3 },  // abajo centro
  ];
  const WIN_PHOTOS = [
    { src:"images/victory/v-1.jpg", slot:WIN_SLOTS[0] },
    { src:"images/victory/v-2.jpg", slot:WIN_SLOTS[1] },
    { src:"images/victory/v-3.png", slot:WIN_SLOTS[2] },
  ];

  // Construye las polaroids a partir de una lista {src, slot, cap?}.
  function buildPolaroids(items){
    polaroidBox.innerHTML = "";
    for (const it of items){
      const slot = it.slot;
      const p = document.createElement("div");
      p.className = "polaroid";
      p.style.setProperty("--x",  slot.x + "px");
      p.style.setProperty("--y",  slot.y + "px");
      p.style.setProperty("--r",  slot.r + "deg");
      p.style.setProperty("--xo", (slot.x * 1.9) + "px");   // salida del encuadro
      p.style.setProperty("--yo", (slot.y * 1.9) + "px");

      const img = document.createElement("img");
      img.className = "pic";
      img.src = it.src;
      img.alt = "";
      img.onerror = function(){
        const ph = document.createElement("div");
        ph.className = "ph";
        ph.innerHTML = "<span>📷</span>";
        this.replaceWith(ph);
      };
      p.appendChild(img);

      if (it.cap){
        const cap = document.createElement("div");
        cap.className = "cap";
        cap.textContent = it.cap;
        p.appendChild(cap);
      }
      polaroidBox.appendChild(p);
    }
  }

  function showPolaroids(){
    const cards = polaroidBox.children;
    for (let i = 0; i < cards.length; i++){
      cards[i].style.transitionDelay = (0.06 * i) + "s";
      cards[i].classList.add("in");
    }
  }

  function hidePolaroids(){
    const cards = polaroidBox.children;
    for (let i = 0; i < cards.length; i++){
      cards[i].style.transitionDelay = (0.05 * i) + "s";
      cards[i].classList.remove("in");
      cards[i].classList.add("out");
    }
  }

  function advance(){
    hidePolaroids();                 // salen del encuadro al volver a jugar
    level++;
    if (level >= LEVELS.length){
      state = STATE.WIN;
      renderWinArt();
      renderIconCanvas(el("lbIcon"), "👑");
      renderHearts(el("winHearts"), lives);
      el("winLevels").textContent = LEVELS.length + "/" + LEVELS.length;
      el("winScore").textContent = "PTS " + score;
      el("lbYou").textContent = score;
      buildPolaroids(WIN_PHOTOS);        // fotos del equipo (Yeison, Lina, Ale)
      showOverlay("win");
      requestAnimationFrame(() => requestAnimationFrame(showPolaroids));
    }
    else startLevel();
  }

  // ---------- Dibujo ----------
  function draw(){
    ctx.fillStyle = LCD;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawBackground();
    if (state === STATE.TITLE) drawTitleScene();
    if (state === STATE.PLAY || state === STATE.CARD || state === STATE.OVER || state === STATE.DYING){
      drawTopBand();
      drawObstacles();
      drawFood();
      drawItem();
      if (state !== STATE.DYING || dyingVisible) drawSnake();   // parpadeo al perder vida
    }
    if (state === STATE.OVER){                    // velo: atenúa la escena para leer el texto
      ctx.fillStyle = "rgba(174,186,106,.90)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // Zona prohibida del Start: la barra de arriba, el texto central (START / SÍ-NO) y las burbujas.
  const TITLE_FOOD = [[20,8],[3,10]];
  function titleForbidden(c){
    if (c.y < 2) return true;                                      // debajo de la barra
    if (c.x>=5 && c.x<=18 && c.y>=5 && c.y<=13) return true;       // texto central
    return TITLE_FOOD.some(([fx,fy]) => fx===c.x && fy===c.y);     // burbujas
  }

  // Elementos decorativos del Start: cúmulos de ladrillos (aleatorios) + comida.
  function drawTitleScene(){
    for (const o of titleBricks){ const {x,y} = cellPx(o); drawBrick(x, y); }
    for (const [cxg,cyg] of TITLE_FOOD){
      const x=cxg*CELL, y=cyg*CELL;
      ctx.strokeStyle=INK; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2, CELL/2-5, 0, 7); ctx.stroke();
      ctx.fillStyle=INK; ctx.beginPath(); ctx.arc(x+CELL/2-2, y+CELL/2-2, 1.5, 0, 7); ctx.fill();
    }
  }

  function drawObstacles(){
    for (const o of obstacles){ const {x,y} = cellPx(o); drawBrick(x, y); }
  }

  // Un ladrillo (celda) con patrón de mortero. Los cúmulos adyacentes se leen como un bloque grande.
  function drawBrick(x, y){
    const h = CELL/2;
    ctx.fillStyle = INK;  ctx.fillRect(x, y, CELL, CELL);
    ctx.fillStyle = LCD;
    ctx.fillRect(x+2, y+h-1, CELL-4, 2);                   // junta horizontal
    ctx.fillRect(x+h-1, y+2, 2, h-3);                      // junta vertical (fila superior)
    ctx.fillRect(x+CELL/4-1, y+h+1, 2, h-3);               // junta vertical abajo-izq
    ctx.fillRect(x+3*CELL/4-1, y+h+1, 2, h-3);             // junta vertical abajo-der
  }

  function drawBackground(){
    // sonar suave: rejilla + burbujas quietas
    ctx.strokeStyle = "rgba(43,48,24,.08)";
    ctx.lineWidth = 1;
    for (let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
    for (let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }
    // marco interior
    ctx.strokeStyle = INK; ctx.lineWidth = 2;
    ctx.strokeRect(2,2,canvas.width-4,canvas.height-4);
  }

  // Banda oscura reservada arriba para el HUD (como el título del nivel)
  function drawTopBand(){
    ctx.fillStyle = INK;
    ctx.fillRect(0, 0, canvas.width, PLAY_TOP*CELL);
    ctx.fillStyle = LCD;
    ctx.fillRect(0, PLAY_TOP*CELL, canvas.width, 2);   // separador
  }

  function cellPx(p){ return { x:p.x*CELL, y:p.y*CELL }; }

  function drawSnake(){
    for (let i=snake.length-1;i>=0;i--){
      const {x,y} = cellPx(snake[i]);
      if (i===0){ drawHead(x,y); continue; }
      // Cuerpo estilo NOKIA: bloques cuadrados sólidos con separación entre segmentos
      ctx.fillStyle = INK;
      ctx.fillRect(x+2, y+2, CELL-4, CELL-4);
    }
  }

  // Cabeza estilo NOKIA: bloque un poco más grande con un "ojo" hacia la dirección
  function drawHead(x,y){
    ctx.fillStyle = INK;
    ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    ctx.fillStyle = LCD;
    const ex = x + CELL/2 + dir.x*4 - 1.5;
    const ey = y + CELL/2 + dir.y*4 - 1.5;
    ctx.fillRect(ex, ey, 3, 3);
  }

  function drawFood(){
    const {x,y} = cellPx(food);
    ctx.strokeStyle = INK; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2, CELL/2-5, 0, 7); ctx.stroke();
    ctx.fillStyle = INK;
    ctx.beginPath(); ctx.arc(x+CELL/2-2, y+CELL/2-2, 1.5, 0, 7); ctx.fill(); // brillo burbuja
  }

  // Item especial = cassette (📼) parpadeante
  function drawItem(){
    if (!item) return;                 // aún no aparece el casete
    blink = (blink+1) % 30;
    if (blink < 8) return; // parpadeo
    const {x,y} = cellPx(item);
    ctx.fillStyle = INK;
    roundRect(x+2, y+4, CELL-4, CELL-8, 3); ctx.fill();
    ctx.fillStyle = LCD;
    ctx.beginPath(); ctx.arc(x+CELL/2-3.5, y+CELL/2, 2.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(x+CELL/2+3.5, y+CELL/2, 2.4, 0, 7); ctx.fill();
    ctx.fillRect(x+CELL/2-3.5, y+CELL/2-1.2, 7, 2.4);
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // Animación del parpadeo del item aunque el juego no “tickee”
  setInterval(() => { if (state===STATE.PLAY) drawItem(); }, 60);

  // ---------- Controles ----------
  const DIRS = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
  };

  document.addEventListener("keydown", e => {
    const k = e.key;
    if (DIRS[k]){
      e.preventDefault();
      const nd = DIRS[k];
      if (state === STATE.TITLE){                 // mover el selector SÍ/NO con flechas
        if (nd.x < 0) setStartSel("si");
        else if (nd.x > 0) setStartSel("no");
        return;
      }
      if (state === STATE.OVER){                  // selector de la pantalla de Chocaste
        if (nd.x < 0) setOverSel("si");
        else if (nd.x > 0) setOverSel("no");
        return;
      }
      if (state === STATE.PLAY && !(nd.x === -dir.x && nd.y === -dir.y) && !(nd.x===dir.x&&nd.y===dir.y)){
        nextDir = nd;
      }
      return;
    }
    if (k === "Enter" || k === " "){
      e.preventDefault();
      if (state === STATE.TITLE){ if (startSel === "si") startGame(); }
      else if (state === STATE.CARD) advance();
      else if (state === STATE.OVER){
        if (overSel === "si"){ lives = MAX_LIVES; updateLivesUI(); retryLevel(); }  // reintenta el nivel actual con vidas nuevas
        else backToTitle();
      }
      else if (state === STATE.WIN) startGame();
    }
    if (k === "p" || k === "P"){
      if (state === STATE.PLAY){ clearInterval(timer); state = STATE.PAUSE; drawPause(); }
      else if (state === STATE.PAUSE){ state = STATE.PLAY; loop(true); }
    }
  });

  function drawPause(){
    draw();
    ctx.fillStyle = "rgba(43,48,24,.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = INK;
    ctx.font = "bold 26px 'Courier New',monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("|| PAUSA", canvas.width/2, canvas.height/2 - 8);
    ctx.font = "12px 'Courier New',monospace";
    ctx.fillText("P para seguir", canvas.width/2, canvas.height/2 + 20);
    ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
  }

  // "START" pixelado (mini-canvas escalado con píxeles duros)
  function renderStartArt(){
    const cv = el("startArt"); if (!cv) return;
    const g = cv.getContext("2d");
    const w = cv.width, h = cv.height;
    g.imageSmoothingEnabled = false;
    g.clearRect(0,0,w,h);
    g.textAlign = "center"; g.textBaseline = "middle";
    g.font = "bold 26px 'Courier New',monospace";
    g.fillStyle = INK_SOFT; g.fillText("START", w/2+2, h/2+2);   // relieve/sombra
    g.fillStyle = INK;      g.fillText("START", w/2,   h/2);     // cara
  }

  // Texto pixelado con relieve (una palabra por línea, separadas por espacios).
  function drawPixelWord(cv, text, fs){
    if (!cv) return;
    const g = cv.getContext("2d");
    const w = cv.width, h = cv.height;
    g.imageSmoothingEnabled = false;
    g.clearRect(0,0,w,h);
    g.textAlign = "center"; g.textBaseline = "middle";
    const lines = text.split(" ");
    const lh = fs * 0.9;                           // interlineado pegado
    g.font = "bold " + fs + "px 'Courier New',monospace";
    const startY = h/2 - (lines.length-1)*lh/2;
    lines.forEach((ln,i) => {
      const y = startY + i*lh;
      g.fillStyle = INK_SOFT; g.fillText(ln, w/2+2, y+2);
      g.fillStyle = INK;      g.fillText(ln, w/2,   y);
    });
  }
  function renderOverArt(text){ drawPixelWord(el("overArt"), text, 34); }
  function renderWinArt(){ drawPixelWord(el("winArt"), "VICTORY", 30); }

  // Pixela un emoji: lo dibuja a baja resolución y CSS lo escala con píxeles duros.
  function renderIconCanvas(cv, emoji){
    if (!cv) return;
    const g = cv.getContext("2d");
    g.imageSmoothingEnabled = false;
    g.clearRect(0,0,cv.width,cv.height);
    g.textAlign = "center"; g.textBaseline = "middle";
    g.font = (cv.width - 2) + "px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
    g.fillText(emoji, cv.width/2, cv.height/2 + 1);
  }

  // Corazones de vida en pixel-art (llenos = vidas restantes, tenues = gastadas)
  const HEART = ["0110110","1111111","1111111","0111110","0011100","0001000"];
  function renderHearts(cv, filled, dark){
    if (!cv) return;
    const full = dark ? INK : LCD;                          // oscuro para fondo claro (tarjeta)
    const empty = dark ? "rgba(43,48,24,.25)" : "rgba(174,186,106,.28)";
    const s = 2, hw = 7*s, hh = 6*s, gap = 3*s;
    cv.width = MAX_LIVES*hw + (MAX_LIVES-1)*gap; cv.height = hh;
    const g = cv.getContext("2d");
    g.imageSmoothingEnabled = false; g.clearRect(0,0,cv.width,cv.height);
    for (let i=0;i<MAX_LIVES;i++){
      const ox = i*(hw+gap);
      g.fillStyle = (i < filled) ? full : empty;
      for (let r=0;r<HEART.length;r++)
        for (let c=0;c<7;c++)
          if (HEART[r][c]==="1") g.fillRect(ox+c*s, r*s, s, s);
    }
  }

  function updateLivesUI(){
    renderHearts(el("startHearts"), MAX_LIVES);   // Start siempre lleno (juego nuevo)
    renderHearts(el("overHearts"), lives);
    renderHearts(el("hudHearts"), lives);
  }

  // Selector SÍ/NO de la pantalla de inicio (SÍ palpita por defecto)
  let startSel = "si";
  function setStartSel(sel){
    startSel = sel;
    el("optSi").classList.toggle("sel", sel === "si");
    el("optNo").classList.toggle("sel", sel === "no");
  }

  // Selector SÍ/NO de la pantalla de Chocaste (SÍ = reintentar, NO = volver al inicio)
  let overSel = "si";
  function setOverSel(sel){
    overSel = sel;
    el("optSiOver").classList.toggle("sel", sel === "si");
    el("optNoOver").classList.toggle("sel", sel === "no");
  }

  function backToTitle(){
    clearInterval(timer);
    state = STATE.TITLE;
    setStartSel("si");
    draw();
    showOverlay("title");
  }

  // ---------- Init ----------
  renderStartArt();
  renderOverArt("GAME OVER");
  renderWinArt();
  renderIconCanvas(el("lbIcon"), "👑");
  updateLivesUI();
  setStartSel("si");
  titleBricks = buildClusters(6, titleForbidden);   // cúmulos aleatorios del Start
  draw();
  showOverlay("title");
})();
</script>
</body>
</html>
